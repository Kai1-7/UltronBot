services:
  - type: web
    name: ultron-bot
    runtime: node
    rootDir: Ultron
    plan: free
    buildCommand: YOUTUBE_DL_SKIP_PYTHON_CHECK=true npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: TOKEN
        sync: false
